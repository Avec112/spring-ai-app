services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: spring-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: spring
      POSTGRES_PASSWORD: spring
      POSTGRES_DB: spring
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spring -d spring"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
